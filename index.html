<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Library | Odin</title>
  </head>
  <body>
    <header>
      <h1>Odin Library</h1>
      <section class="action-btn">
        <button class="action btn-add">Add new book</button>
        <button class="action btn-clear">Clear library</button>
        <!-- <button class="action"></button> -->
      </section>
    </header>

    <main>
      <section class="books">
        <ul class="book_lists">
          <li class="book" data-index="12">
            <h2>Harry Potter</h2>
            <p>Author: J.K. Rowling</p>
            <div class="book__info">
              <span>400 pages</span>
              <span class="read-info">Have not read yet</span>
            </div>
            <div class="book__action">
              <button class="toggle-read">Toggle read</button
              ><button class="remove-book">Remove book</button>
            </div>
          </li>
          <li class="book" data-index="14">
            <h2>Harry Potter</h2>
            <p>Author: J.K. Rowling</p>
            <div class="book__info">
              <span>400 pages</span>
              <span class="read-info">Have not read yet</span>
            </div>
            <div class="book__action">
              <button class="toggle-read">Toggle read</button
              ><button class="remove-book">Remove book</button>
            </div>
          </li>
        </ul>
      </section>
    </main>

    <section class="modal">
      <section class="modal__content">
        <div class="content__header">
          <h2>Please enter the book details</h2>
        </div>
        <div class="content__body">
          <form action="/index.html" method="post" id="addBookForm">
            <div class="input">
              <label for="title">Book title</label>
              <input
                type="text"
                name="title"
                id="title"
                placeholder="Book title, e.g: Harry Potter"
              />
            </div>
            <div class="input">
              <label for="author">Book author</label>
              <input
                type="text"
                name="author"
                id="author"
                placeholder="Author name, e.g: J.K. Rowling"
              />
            </div>
            <div class="input">
              <label for="num_pages">Book total pages</label>
              <input
                type="number"
                name="num_pages"
                id="num_pages"
                placeholder="Total pages, e.g: 125"
              />
            </div>
            <input type="submit" value="Save" />
          </form>
        </div>
        <div class="content__footer">
          <button type="submit">Add book</button>
          <button class="hide-modal">Cancel</button>
        </div>
      </section>
    </section>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
