<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Library | Odin</title>
  </head>
  <body>
    <header>Odin Library</header>

    <section class="action-btn">
      <button class="action">Add new book</button>
      <button class="action">Clear library</button>
      <!-- <button class="action"></button> -->
    </section>

    <section class="books">
      <ul class="book_lists">
        <li class="book">
          <h2>Harry Potter</h2>
          <p>Author: J.K. Rowling</p>
          <div class="book__info">
            <span>400 pages</span>
            <span>Have not read yet</span>
          </div>
          <div class="book__action">
            <button class="toggle-read">Toggle read</button
            ><button class="remove-book">Remove book</button>
          </div>
        </li>
      </ul>
    </section>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
